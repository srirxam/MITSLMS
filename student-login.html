<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Login – MITS LMS</title>
    <meta name="description" content="Login to MITS student portal to access courses, tests, and attendance." />
      <link rel="icon" type="image/png" href="icons/icon-192.png"/>
<link rel="stylesheet" href="css/main.css" />
      <link rel="icon" type="image/png" href="icons/icon-192.png"/>
<link rel="stylesheet" href="css/auth.css" />
</head>

<body class="auth-body">

    <div class="auth-bg">
        <div class="auth-orb auth-orb-1"></div>
        <div class="auth-orb auth-orb-2"></div>
    </div>

    <div class="auth-layout-single">

        <!-- Login Panel -->
        <div class="auth-panel-single">
            <div class="auth-card">
                <!-- Logo -->
                <div class="auth-card-logo">
                    <a href="index.html" class="back-link-card">← Back to Home</a>
                    <div class="auth-logo-inline">
                        <img src="icons/icon-192.png" alt="MITS Logo" class="logo-img-sm" />
                        <div>
                            <div class="logo-name-dark">MITS</div>
                            <div class="logo-tagline-dark">Learning Management System</div>
                        </div>
                    </div>
                </div>
                <div class="auth-card-header">
                    <div class="auth-avatar student-avatar">🎒</div>
                    <h2>Welcome Back!</h2>
                    <p>Sign in to your student account</p>
                </div>

                <form class="auth-form" id="studentLoginForm" onsubmit="return handleLogin(event)">


                    <div class="form-group">
                        <label class="form-label" for="studentId">Student ID</label>
                        <div class="input-group">
                            <span class="input-icon">🎓</span>
                            <input type="text" id="studentId" class="form-input" placeholder="e.g. STU-2024-0042"
                                autocomplete="username" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="studentPassword">Password</label>
                        <div class="input-group">
                            <span class="input-icon">🔒</span>
                            <input type="password" id="studentPassword" class="form-input"
                                placeholder="Enter your password" autocomplete="current-password"
                                required />
                            <button type="button" class="input-suffix"
                                onclick="togglePassword('studentPassword', this)">👁️</button>
                        </div>
                    </div>

                    <div class="form-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" checked />
                            <span class="checkbox-box"></span>
                            Remember me
                        </label>
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-xl w-full" id="loginBtn">
                        <span id="loginBtnText">Sign In</span>
                        <span id="loginBtnSpinner" class="hidden">⟳</span>
                    </button>

                    <div id="loginError" class="alert alert-danger hidden" style="margin-top:1rem">
                        <span class="alert-icon">❌</span>
                        <span id="loginErrorMsg">Invalid credentials. Please try again.</span>
                    </div>

                </form>

                <div class="auth-footer">
                    <p>Not a student? <a href="teacher-login.html" class="auth-link">Go to Teacher Login →</a></p>
                    <p style="margin-top:.5rem">Contact your teacher if you don't have credentials.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <!-- Firebase v9 Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/mock-data.js"></script>
    <script src="js/auth.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const id  = document.getElementById('studentId').value.trim();
            const pwd = document.getElementById('studentPassword').value;
            const btn    = document.getElementById('loginBtn');
            const errBox = document.getElementById('loginError');
            const errMsg = document.getElementById('loginErrorMsg');

            btn.disabled = true;
            document.getElementById('loginBtnText').textContent = 'Signing in...';
            errBox.classList.add('hidden');

            try {
                // ── Try Firestore first ──────────────────────────────
                const snap = await db.collection('students')
                    .where('id', '==', id)
                    .get();

                if (!snap.empty) {
                    const user = snap.docs[0].data();
                    if (user.password === pwd) {
                        sessionStorage.setItem('mits_user', JSON.stringify({ ...user, role: 'student' }));
                        showToast('✅ Login successful! Redirecting...', 'success');
                        setTimeout(() => { window.location.href = 'student.html'; }, 900);
                        return false;
                    } else {
                        errMsg.textContent = 'Invalid Student ID or password.';
                        errBox.classList.remove('hidden');
                        btn.disabled = false;
                        document.getElementById('loginBtnText').textContent = 'Sign In';
                        return false;
                    }
                }

                // ── Fallback to mock data ───────────────────────────
                const localStudents = JSON.parse(localStorage.getItem('mock_students')) || MOCK_DATA.students;
                const mockUser = localStudents.find(s => s.id === id);
                if (mockUser) {
                    if (mockUser.password === pwd) {
                        sessionStorage.setItem('mits_user', JSON.stringify({ ...mockUser, role: 'student' }));
                        showToast('✅ Login successful! (mock mode)', 'success');
                        setTimeout(() => { window.location.href = 'student.html'; }, 900);
                        return false;
                    } else {
                        errMsg.textContent = 'Invalid Student ID or password.';
                        errBox.classList.remove('hidden');
                        btn.disabled = false;
                        document.getElementById('loginBtnText').textContent = 'Sign In';
                        return false;
                    }
                }

                errMsg.textContent = 'Invalid Student ID or password.';
                errBox.classList.remove('hidden');
                btn.disabled = false;
                document.getElementById('loginBtnText').textContent = 'Sign In';

            } catch (err) {
                console.warn('Firebase error, falling back to mock:', err.message);
                const localStudents = JSON.parse(localStorage.getItem('mock_students')) || MOCK_DATA.students;
                const mockUser = localStudents.find(s => s.id === id);
                if (mockUser) {
                    if (mockUser.password === pwd) {
                        sessionStorage.setItem('mits_user', JSON.stringify({ ...mockUser, role: 'student' }));
                        showToast('✅ Login successful! (offline mode)', 'success');
                        setTimeout(() => { window.location.href = 'student.html'; }, 900);
                    } else {
                        errMsg.textContent = 'Invalid Student ID or password.';
                        errBox.classList.remove('hidden');
                        btn.disabled = false;
                        document.getElementById('loginBtnText').textContent = 'Sign In';
                    }
                } else {
                    errMsg.textContent = 'Invalid credentials. Check connection and try again.';
                    errBox.classList.remove('hidden');
                    btn.disabled = false;
                    document.getElementById('loginBtnText').textContent = 'Sign In';
                }
            }
            return false;
        }

        function togglePassword(id, btn) {
            const inp = document.getElementById(id);
            inp.type = inp.type === 'password' ? 'text' : 'password';
            btn.textContent = inp.type === 'password' ? '👁️' : '🙈';
        }
    </script>
</body>

</html>
